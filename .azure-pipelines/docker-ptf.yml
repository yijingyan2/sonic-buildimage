# Starter pipeline
# Start with a minimal pipeline that you can customize to build and deploy your code.
# Add steps that build, run tests, deploy, and more:
# https://aka.ms/yaml
# Build and push docker-ptf image

schedules:
- cron: "0 8 * * *"
  branches:
    include:
    - master
  always: true

trigger: none
pr:
  branches:
    include:
    - master
    - 202???
  paths:
    include:
    - dockers/docker-ptf

resources:
  repositories:
  - repository: sonic-mgmt
    type: github
    name: sonic-net/sonic-mgmt
    ref: master
    endpoint: sonic-net

parameters:
- name: registry_url
  type: string
  default: sonicdev-microsoft.azurecr.io
- name: registry_conn
  type: string
  default: sonicdev

stages:
- stage: Build
  jobs:
  - job: Build
    pool: sonicso1ES-amd64
    timeoutInMinutes: 360
    steps:
    - template: cleanup.yml
    - checkout: self
      clean: true
    - script: |
        set -x
        sudo setfacl -R -b $(Agent.BuildDirectory)
      displayName: 'setfacl'

    - bash: |
        set -xe
        git submodule update --init --recursive -- src/ptf src/ptf-py3 src/sonic-sairedis src/sonic-swss-common

        make NOBUSTER=1 NOBULLSEYE=1 SONIC_BUILD_JOBS=$(nproc) DEFAULT_CONTAINER_REGISTRY=publicmirror.azurecr.io ENABLE_DOCKER_BASE_PULL=y configure PLATFORM=vs DOCKER_BUILDKIT=0 NOTRIXIE=1 # docker-ptf is built for bookworm, disable trixie currently to save build time. will enable it after migrating to trixie.
        make -f Makefile.work BLDENV=bookworm SONIC_BUILD_JOBS=$(nproc) DEFAULT_CONTAINER_REGISTRY=publicmirror.azurecr.io ENABLE_DOCKER_BASE_PULL=y target/docker-ptf.gz
        cp -r target $(Build.ArtifactStagingDirectory)/target
      displayName: Build docker-ptf.gz

    - publish:  $(Build.ArtifactStagingDirectory)
      artifact: 'docker-ptf'
      displayName: "Archive docker image ptf"

- stage: Test
  dependsOn: Build
  condition: and(succeeded(), in(dependencies.Build.result, 'Succeeded'))
  variables:
  - group: SONiC-Elastictest
  - name: BUILD_BRANCH
    value: $(Build.SourceBranchName)
  jobs:
  - job: trivy_scan
    displayName: "[OPTIONAL] Trivy vulnerability scan (docker-ptf)"
    pool: sonic-ubuntu-1c
    continueOnError: true
    timeoutInMinutes: 30
    steps:
    - checkout: self
      clean: true
      fetchDepth: 1
    - download: current
      artifact: docker-ptf
      displayName: "Download docker-ptf artifact"
    - script: |
        set -ex
        TRIVY_VERSION="0.70.0"
        curl -fLO https://github.com/aquasecurity/trivy/releases/download/v${TRIVY_VERSION}/trivy_${TRIVY_VERSION}_Linux-64bit.deb
        sudo apt install -y ./trivy_${TRIVY_VERSION}_Linux-64bit.deb
        trivy --version
      displayName: "Install Trivy"
    - script: |
        set -x
        trivy image \
          --input $(Pipeline.Workspace)/docker-ptf/target/docker-ptf.gz \
          --scanners vuln \
          --severity MEDIUM,HIGH,CRITICAL \
          --ignore-unfixed \
          --exit-code 1 \
          --format table \
          --no-progress \
          --timeout 15m \
          --output $(Build.ArtifactStagingDirectory)/trivy-docker-ptf.txt
        TRIVY_EXIT=$?
        echo ""
        echo "=== Trivy Scan Results (docker-ptf) ==="
        cat $(Build.ArtifactStagingDirectory)/trivy-docker-ptf.txt
        exit $TRIVY_EXIT
      displayName: "Trivy scan docker-ptf"
    - publish: $(Build.ArtifactStagingDirectory)/trivy-docker-ptf.txt
      artifact: trivy-scan-results
      displayName: "Publish Trivy scan results"
      condition: always()
      continueOnError: true

  - template: .azure-pipelines/pr_test_template.yml@sonic-mgmt
    parameters:
      CHECKOUT_SONIC_MGMT: true
      PTF_MODIFIED: 'True'
      INCLUDE_JOBS: "t0_job,t1_job,t2_job,t0_2vlans_job,t0_sonic_job,dpu_job,t1_multi_asic_job"

- stage: Publish
  dependsOn: Test
  condition: and(not(canceled()), ne(variables['Build.Reason'], 'PullRequest'), in(dependencies.Test.result, 'Succeeded', 'SucceededWithIssues'))
  jobs:
  - job: PublishAsLatest
    pool: sonicso1ES-amd64
    timeoutInMinutes: 60
    steps:
    - download: current
      artifact: 'docker-ptf'
      displayName: "Download docker-ptf image"

    - bash: |
        set -ex
        docker load -i $(Pipeline.Workspace)/docker-ptf/target/docker-ptf.gz
        docker tag docker-ptf:latest $REGISTRY_SERVER/docker-ptf:latest
        docker images
      env:
        REGISTRY_SERVER: ${{ parameters.registry_url }}
      displayName: 'Load and tag docker-ptf as latest'

    # - task: Docker@2
    #   displayName: 'Push docker-ptf:latest to registry'
    #   condition: succeeded()
